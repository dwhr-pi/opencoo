<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="mono">Buttons · mono-affixed shortcuts</div>
<div style="display:flex; flex-wrap:wrap; gap: 10px; align-items:center;">
  <button style="display:inline-flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:13px;font-weight:500;padding:9px 14px;border-radius:3px;border:1px solid #121210;background:#121210;color:#F6F3EC;cursor:pointer;">Approve <span style="font-family:var(--font-mono);font-size:11px;opacity:.65">⏎</span></button>
  <button style="display:inline-flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:13px;font-weight:500;padding:9px 14px;border-radius:3px;border:1px solid #121210;background:transparent;color:#121210;cursor:pointer;">Reject <span style="font-family:var(--font-mono);font-size:11px;color:#78746B">⌫</span></button>
  <button style="display:inline-flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:13px;font-weight:500;padding:9px 14px;border-radius:3px;border:1px solid oklch(0.42 0.10 55);background:oklch(0.74 0.13 70);color:#1b1409;cursor:pointer;">Run heartbeat <span style="font-family:var(--font-mono);font-size:11px;opacity:.65">⌘H</span></button>
  <button style="display:inline-flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:13px;font-weight:500;padding:9px 14px;border-radius:3px;border:1px solid var(--rule);background:var(--paper-2);color:#121210;cursor:pointer;">Re-compile page</button>
</div>
<div class="mono" style="color:var(--ink-4);">Solid ink primary · outline secondary · advisory amber for agent actions · subtle for tertiary</div>
</div></body></html>
