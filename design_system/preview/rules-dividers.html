<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="mono">Rules &amp; dividers · depth by border, never shadow</div>
<div style="display:flex; flex-direction:column; gap:12px;">
  <div style="border-top: 1px solid var(--ink); padding-top: 6px;"><span class="mono" style="float:right">1px · ink primary</span>&nbsp;</div>
  <div style="border-top: 1px solid var(--rule); padding-top: 6px;"><span class="mono" style="float:right">1px · 10% ink subtle</span>&nbsp;</div>
  <div style="border-top: 1px dashed var(--rule); padding-top: 6px;"><span class="mono" style="float:right">1px dashed · sub-group</span>&nbsp;</div>
  <div style="border-top: 2px solid oklch(0.74 0.13 70); padding-top: 6px;"><span class="mono" style="float:right">2px · advisory rail</span>&nbsp;</div>
</div>
<div class="mono" style="color:var(--ink-4); line-height:1.5;">Shadows are never used for elevation. opencoo is a printed book, not a glass UI — depth is signaled by border weight &amp; background shift.</div>
</div></body></html>
