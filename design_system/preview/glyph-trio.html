<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card" style="gap:10px;">
<div class="mono">The three glyphs · c → o → o · open → compile → operate</div>
<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:14px;">
  <div style="padding: 18px; border: 1px solid var(--rule); border-radius:4px; background: var(--paper); display:flex; flex-direction:column; align-items:center; gap:10px;">
    <img src="../assets/glyph-c-open.svg" width="72" height="72" alt="open"/>
    <div style="font-family: var(--font-sans); font-size:13px; font-weight:500;">c · open</div>
    <div class="mono" style="color:var(--ink-4); text-align:center; line-height:1.4;">ingest — open to any source</div>
  </div>
  <div style="padding: 18px; border: 1px solid var(--rule); border-radius:4px; background: var(--paper); display:flex; flex-direction:column; align-items:center; gap:10px;">
    <img src="../assets/glyph-o-compile.svg" width="72" height="72" alt="compile"/>
    <div style="font-family: var(--font-sans); font-size:13px; font-weight:500;">o · compile</div>
    <div class="mono" style="color:var(--ink-4); text-align:center; line-height:1.4;">synthesize — a finished page</div>
  </div>
  <div style="padding: 18px; border: 1px solid var(--rule); border-radius:4px; background: var(--paper); display:flex; flex-direction:column; align-items:center; gap:10px;">
    <img src="../assets/glyph-o-operate.svg" width="72" height="72" alt="operate"/>
    <div style="font-family: var(--font-sans); font-size:13px; font-weight:500;">o · operate</div>
    <div class="mono" style="color:var(--ink-4); text-align:center; line-height:1.4;">act — agent orbit</div>
  </div>
</div>
</div></body></html>
