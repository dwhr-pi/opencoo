<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="mono">Form fields · mono values, micro uppercase labels</div>
<div style="display:flex; flex-direction:column; gap:10px;">
  <label style="display:flex; flex-direction:column; gap:4px;">
    <span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: .1em; text-transform: uppercase;">source type</span>
    <select style="font-family: var(--font-mono); font-size: 13px; color: var(--ink); background: var(--paper); border: 1px solid var(--rule); padding: 10px 12px; border-radius: 4px;"><option>notion</option></select>
  </label>
  <label style="display:flex; flex-direction:column; gap:4px;">
    <span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: .1em; text-transform: uppercase;">target domain</span>
    <input value="wiki-executive" style="font-family: var(--font-mono); font-size: 13px; color: var(--ink); background: var(--paper); border: 1px solid var(--rule); padding: 10px 12px; border-radius: 4px;"/>
  </label>
  <label style="display:flex; flex-direction:column; gap:4px;">
    <span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: .1em; text-transform: uppercase;">review mode</span>
    <input value="approve · human-in-the-loop" style="font-family: var(--font-mono); font-size: 13px; color: var(--ink); background: var(--paper); border: 1px solid var(--rule); padding: 10px 12px; border-radius: 4px;"/>
  </label>
</div>
</div></body></html>
