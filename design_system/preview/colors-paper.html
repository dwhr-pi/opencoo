<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.swatches{ display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.sw{ aspect-ratio: 4/3; border: 1px solid var(--rule); padding: 10px 12px; display:flex; flex-direction:column; justify-content:space-between; font-family: var(--font-mono); font-size: 11px; border-radius: 3px; }
.sw b{ font-weight:500; font-size: 12px; letter-spacing: .03em; color: var(--ink); }
.sw span{ color: var(--ink-3); font-size: 10px; text-transform: uppercase; letter-spacing:.06em; }
</style></head><body><div class="card">
<div class="mono">Paper &amp; Ink · warm neutral system</div>
<div class="swatches">
  <div class="sw" style="background:#F6F3EC"><b>Paper</b><span>#F6F3EC · base</span></div>
  <div class="sw" style="background:#EFEBE1"><b>Paper/2</b><span>#EFEBE1 · card</span></div>
  <div class="sw" style="background:#E6E1D4"><b>Paper/3</b><span>#E6E1D4 · rule</span></div>
  <div class="sw" style="background:#FFFFFF;border:1px solid #E6E1D4"><b>White</b><span>#FFFFFF · reserved</span></div>
  <div class="sw" style="background:#A8A398;color:#fff"><b style="color:#fff">Ink/4</b><span style="color:#ffffffaa">#A8A398 · placeholder</span></div>
  <div class="sw" style="background:#78746B;color:#fff"><b style="color:#fff">Ink/3</b><span style="color:#ffffffaa">#78746B · muted</span></div>
  <div class="sw" style="background:#3D3B36;color:#fff"><b style="color:#fff">Ink/2</b><span style="color:#ffffffaa">#3D3B36 · body</span></div>
  <div class="sw" style="background:#121210;color:#F6F3EC"><b style="color:#F6F3EC">Ink</b><span style="color:#ffffff77">#121210 · primary</span></div>
</div>
</div></body></html>
