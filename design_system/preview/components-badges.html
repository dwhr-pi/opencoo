<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.badge{ font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; padding: 3px 7px; border-radius: 3px; background: var(--paper-2); color: var(--ink-2); border: 1px solid var(--rule); }
.badge.wiki{ background: color-mix(in oklab, oklch(0.55 0.08 180) 14%, var(--paper)); color: oklch(0.55 0.08 180); border-color: color-mix(in oklab, oklch(0.55 0.08 180) 25%, var(--paper)); }
.badge.adv{ background: color-mix(in oklab, oklch(0.74 0.13 70) 28%, var(--paper)); color: oklch(0.42 0.10 55); border-color: color-mix(in oklab, oklch(0.74 0.13 70) 40%, var(--paper)); }
.badge.alert{ background: color-mix(in oklab, oklch(0.62 0.17 25) 14%, var(--paper)); color: oklch(0.62 0.17 25); border-color: color-mix(in oklab, oklch(0.62 0.17 25) 30%, var(--paper)); }
.badge.ok{ background: color-mix(in oklab, #1f8a5a 14%, var(--paper)); color: #1b6a46; border-color: color-mix(in oklab, #1f8a5a 26%, var(--paper)); }
</style></head><body><div class="card">
<div class="mono">Status badges · mono uppercase</div>
<div style="display:flex; flex-wrap:wrap; gap:8px;">
  <span class="badge wiki">wiki-executive</span>
  <span class="badge adv">heartbeat</span>
  <span class="badge ok">compiled</span>
  <span class="badge">review · approve</span>
  <span class="badge alert">guard flag</span>
  <span class="badge">n8n · disabled</span>
  <span class="badge adv">ceo · heartbeat</span>
  <span class="badge">drifted</span>
  <span class="badge alert">contradiction</span>
</div>
</div></body></html>
