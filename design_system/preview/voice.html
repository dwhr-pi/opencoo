<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="mono">Voice · do &amp; don't</div>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
  <div style="border: 1px solid var(--rule); border-radius: 3px; padding: 14px; background: var(--paper);">
    <span style="display:inline-block; font-family:var(--font-mono); font-size:10px; padding:3px 7px; border-radius:3px; letter-spacing:.08em; text-transform:uppercase; background: color-mix(in oklab, #1f8a5a 14%, var(--paper)); color: #1b6a46; margin-bottom:10px;">DO</span>
    <p style="margin:0; font-size:13px; color: var(--ink); line-height:1.5;"><b>"Compiled at ingestion, not retrieved at query time."</b></p>
    <p style="margin:6px 0 0; font-size:13px; color:var(--ink-2); line-height:1.5;">Short sentences. Concrete nouns. Technical specificity. Lowercase "opencoo", always.</p>
  </div>
  <div style="border: 1px solid var(--rule); border-radius: 3px; padding: 14px; background: var(--paper);">
    <span style="display:inline-block; font-family:var(--font-mono); font-size:10px; padding:3px 7px; border-radius:3px; letter-spacing:.08em; text-transform:uppercase; background: color-mix(in oklab, oklch(0.62 0.17 25) 14%, var(--paper)); color: oklch(0.62 0.17 25); margin-bottom:10px;">DON'T</span>
    <p style="margin:0; font-size:13px; color: var(--ink); line-height:1.5;"><b>"Revolutionary AI-powered platform."</b></p>
    <p style="margin:6px 0 0; font-size:13px; color:var(--ink-2); line-height:1.5;">No OpenCoo / OpenCOO / Open Coo. No emoji. No gradients. 🚀 — never.</p>
  </div>
</div>
</div></body></html>
